<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コンテンツ機関銃 v2 | AIの町医者</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>* { margin:0; padding:0; box-sizing:border-box; } body { font-family:'Noto Sans JP',sans-serif; background:#f5f0e8; }</style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const {useState,useCallback} = React;

const PROXY_URL = "https://aisdr-proxy.hdxrope.workers.dev";
const SDR_URL   = "https://hideo-t.github.io/aidoctor/sdr/";

const ANGLES = [
  {id:"story",   label:"体験談",   icon:"📖"},
  {id:"industry",label:"業種別",   icon:"🏭"},
  {id:"number",  label:"数字",     icon:"📊"},
  {id:"phil",    label:"哲学",     icon:"🧠"},
  {id:"local",   label:"地域",     icon:"🗾"},
  {id:"how",     label:"ハウツー", icon:"🔧"},
  {id:"future",  label:"未来予測", icon:"🚀"},
];
const FAIL_ANGLE = {id:"fail", label:"失敗談", icon:"💥"};
const INDUSTRIES = ["飲食店","建設業","不動産業","介護・福祉","小売業","美容サロン","農業","製造業","士業","整骨院・整体"];

const C = {
  bg:"#f5f0e8", card:"#fff", accent:"#c05a2e", accentDark:"#9e4623",
  text:"#1a1a1a", dim:"#555", muted:"#999", border:"#e0d8d0",
  green:"#3a8f6e", surface:"#faf7f2",
  fail:"#7c5cbf", failBg:"rgba(124,92,191,0.07)", failBorder:"rgba(124,92,191,0.25)",
};

const SYSTEM = `あなたは「AIの町医者」高橋秀夫（56歳、福島・沖縄二拠点、AI活用コンサル）の代筆ライターです。
【プロフィール】30年ぶりにITに復帰。RTX5090+5080のローカルAI環境構築。中小企業AI活用を月額定額サポート。哲学：「象の力を借りるハエ」。目標：月額顧客25件。
【文体】一人称「私」。です・ます調。数字と具体例必須。##見出しOK。最後にCTA必須：" + SDR_URL + "
note記事：1200〜1800字。Xポスト：140字以内。

必ずJSON形式のみで出力（コードブロック不要）：
{"title":"タイトル","note_body":"note記事本文(改行は\\n)","note_tags":["タグ1","タグ2","タグ3","タグ4","タグ5"],"x_post":"Xポスト140字以内","x_hashtags":["#タグ1","#タグ2","#タグ3"],"img_prompt_no_text":"ChatGPT/DALL-E向け英語プロンプト。テキスト一切なし。note記事ヘッダー画像。1600x900px。明るくプロフェッショナルなビジュアル。200字以内。","img_prompt_with_text":"ChatGPT/DALL-E向け英語プロンプト。画像内に日本語キャッチコピーを大きく配置する指示を含む。記事タイトルの核心を15字以内で画像テキストとして指定。1600x900px。250字以内。"}`;

const FAIL_SYSTEM = `あなたは「AIの町医者」高橋秀夫（56歳、福島・沖縄二拠点、AI活用コンサル）の代筆ライターです。
【重要】これは「失敗談・遠回り話」専用記事です。成功話ではなく、正直な失敗・恥ずかしい遠回り・やらかしを書く。自虐OK、でも最後は学びで終わる。最後にCTA必須：" + SDR_URL + "
note記事：1000〜1500字。Xポスト：140字以内。

テーマ例（毎回違うものを選んで）：最初に作ったチャットボットが全く使えなかった話/AIに頼りすぎて大事なことを見落とした話/30年ブランクのITおじさんが犯した初歩的ミスの数々/見積もりを大幅に外して赤字になりかけた話/自動化しようとして逆に手間が増えた話

必ずJSON形式のみで出力（コードブロック不要）：
{"title":"タイトル（失敗感が伝わるもの）","note_body":"note記事本文(改行は\\n)","note_tags":["タグ1","タグ2","タグ3","タグ4","タグ5"],"x_post":"Xポスト140字以内（失敗ネタで共感を誘う）","x_hashtags":["#タグ1","#タグ2","#タグ3"],"img_prompt_no_text":"ChatGPT/DALL-E向け英語プロンプト。テキスト一切なし。失敗・遠回りの雰囲気が出るユーモラスなイラスト風画像。1600x900px。200字以内。","img_prompt_with_text":"ChatGPT/DALL-E向け英語プロンプト。失敗感のある日本語キャッチコピーを画像内に大きく配置する指示含む。1600x900px。250字以内。"}`;

function buildPrompt(angle,industry,index,isFail){
  if(isFail) return "失敗談記事を生成してください。記事番号："+(index+1)+"\\nJSON形式のみで出力。";
  const map={story:"実体験ベースの物語。30年ぶりにITに戻った56歳が"+industry+"のAI営業自動化をした話。",industry:industry+"向けAI活用事例。業種特有の課題・解決策・具体数字。",number:"数字で語る。"+industry+"でのコスト・ROI・時間削減データ。",phil:"「象の力を借りるハエ」哲学で語る中小企業のAI戦略。",local:"福島・沖縄二拠点経営×AI。地方×AIの可能性。",how:industry+"でのAI導入ステップ。初心者向け具体的手順。",future:"5年後のAI×中小企業の未来予測。今から準備すべきこと。"};
  return "角度："+(map[angle]||map.story)+"\\n記事番号："+(index+1)+"\\nJSON形式のみで出力。";
}

async function generateOne(angle,industry,index,isFail){
  const res=await fetch(PROXY_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,system:isFail?FAIL_SYSTEM:SYSTEM,messages:[{role:"user",content:buildPrompt(angle,industry,index,isFail)}]})});
  const data=await res.json();
  const text=data.content?.map(b=>b.text||"").join("")||"";
  return JSON.parse(text.replace(/```json|```/g,"").trim());
}

function downloadThumbnailCSV(articles){
  const h="番号,種別,タイトル,プロンプト（テキストなし）,プロンプト（テキストあり）,保存ファイル名\n";
  const rows=articles.map((a,i)=>{const fn="thumbnail_"+String(i+1).padStart(3,"0")+"_"+(a._isFail?"fail":"note")+".png";return i+1+","+(a._isFail?"失敗談":"通常")+",\""+(a.title||"").replace(/"/g,'""')+"\""+",\""+(a.img_prompt_no_text||"").replace(/"/g,'""')+"\""+",\""+(a.img_prompt_with_text||"").replace(/"/g,'""')+"\""+",\""+fn+"\"";}).join("\n");
  const blob=new Blob(["\uFEFF"+h+rows],{type:"text/csv;charset=utf-8"});
  const url=URL.createObjectURL(blob);const el=document.createElement("a");el.href=url;el.download="thumbnails_"+articles.length+"本.csv";el.click();
}

function downloadCSV(articles){
  const h="番号,種別,角度,業種,タイトル,note本文,noteタグ,Xポスト,Xハッシュタグ\n";
  const rows=articles.map((a,i)=>i+1+","+(a._isFail?"失敗談":"通常")+","+a._angle+","+a._industry+",\""+(a.title||"").replace(/"/g,'""')+"\""+",\""+(a.note_body||"").replace(/\n/g,"\\n").replace(/"/g,'""')+"\""+",\""+(a.note_tags||[]).join(" ")+"\""+",\""+(a.x_post||"").replace(/"/g,'""')+"\""+",\""+(a.x_hashtags||[]).join(" ")+"\"").join("\n");
  const blob=new Blob(["\uFEFF"+h+rows],{type:"text/csv;charset=utf-8"});
  const url=URL.createObjectURL(blob);const el=document.createElement("a");el.href=url;el.download="aidoctor_contents_"+articles.length+"本.csv";el.click();
}

function App(){
  const [count,setCount]=useState(5);
  const [angle,setAngle]=useState("all");
  const [industry,setIndustry]=useState("all");
  const [articles,setArticles]=useState([]);
  const [running,setRunning]=useState(false);
  const [progress,setProgress]=useState(0);
  const [selected,setSelected]=useState(null);
  const [copied,setCopied]=useState("");
  const [tab,setTab]=useState("note");

  const generate=useCallback(async()=>{
    setRunning(true);setArticles([]);setProgress(0);
    const results=[];const angles=ANGLES.map(a=>a.id);const inds=INDUSTRIES;
    for(let i=0;i<count;i++){
      const isFail=(i+1)%5===0;
      const a=isFail?FAIL_ANGLE.id:(angle==="all"?angles[i%angles.length]:angle);
      const ind=industry==="all"?inds[i%inds.length]:industry;
      try{
        const art=await generateOne(a,ind,i,isFail);
        art._angle=a;art._industry=ind;art._id=i;art._isFail=isFail;
        results.push(art);setArticles([...results]);setProgress(i+1);
      }catch(e){console.error(i,e);}
      await new Promise(r=>setTimeout(r,750));
    }
    setRunning(false);
  },[count,angle,industry]);

  const copyText=(text,key)=>{navigator.clipboard.writeText(text);setCopied(key);setTimeout(()=>setCopied(""),2000);};
  const cardStyle=(art)=>({padding:12,borderRadius:10,cursor:"pointer",background:art._isFail?C.failBg:C.card,border:"1px solid "+(selected?._id===art._id?(art._isFail?C.fail:C.accent):(art._isFail?C.failBorder:C.border)),boxShadow:selected?._id===art._id?"0 0 0 2px "+(art._isFail?C.fail:C.accent):"none"});
  const TABS=[["note","📝 note記事"],["x","🐦 Xポスト"],["img","🖼 画像プロンプト"]];

  return (
    <div style={{minHeight:"100vh",background:C.bg,paddingBottom:60}}>
      <div style={{background:C.card,borderBottom:"1px solid "+C.border,padding:"14px 20px",display:"flex",alignItems:"center",gap:10,position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 8px rgba(0,0,0,0.04)"}}>
        <div style={{width:34,height:34,borderRadius:"50%",background:"linear-gradient(135deg,"+C.accent+","+C.accentDark+")",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:16}}>🔫</div>
        <div><div style={{fontSize:14,fontWeight:800,color:C.text}}>コンテンツ機関銃 v2</div><div style={{fontSize:10,color:C.muted}}>note×X 飽和投稿 ＋ ChatGPT画像プロンプト自動生成</div></div>
        {articles.length>0&&<div style={{marginLeft:"auto",display:"flex",gap:6}}>
          <button onClick={()=>downloadThumbnailCSV(articles)} style={{padding:"6px 12px",borderRadius:8,background:C.fail,color:"#fff",fontWeight:700,fontSize:11,border:"none",cursor:"pointer"}}>🖼 サムネCSV</button>
          <button onClick={()=>downloadCSV(articles)} style={{padding:"6px 12px",borderRadius:8,background:C.green,color:"#fff",fontWeight:700,fontSize:11,border:"none",cursor:"pointer"}}>📥 全データCSV</button>
        </div>}
      </div>

      <div style={{maxWidth:900,margin:"0 auto",padding:"20px 16px"}}>
        <div style={{background:C.card,borderRadius:16,border:"1px solid "+C.border,padding:20,marginBottom:16}}>
          <div style={{fontSize:12,fontWeight:700,color:C.accent,marginBottom:14,letterSpacing:"0.08em"}}>⚙️ 生成設定</div>
          <div style={{padding:"8px 12px",borderRadius:8,background:C.failBg,border:"1px solid "+C.failBorder,marginBottom:14,fontSize:11,color:C.fail}}>
            💥 <strong>5本に1本</strong>は失敗談・遠回り話を自動挿入（紫カード）　🖼 <strong>全記事にChatGPT画像プロンプトを同時生成</strong>（テキストなし版・あり版の2枚）
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:14}}>
            <div>
              <label style={{fontSize:11,color:C.dim,display:"block",marginBottom:5}}>生成本数</label>
              <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                {[5,10,20,50,100].map(n=><button key={n} onClick={()=>setCount(n)} style={{padding:"5px 12px",borderRadius:6,fontSize:12,fontWeight:700,cursor:"pointer",background:count===n?C.accent:C.surface,color:count===n?"#fff":C.text,border:"1px solid "+(count===n?C.accent:C.border)}}>{n}本</button>)}
              </div>
            </div>
            <div>
              <label style={{fontSize:11,color:C.dim,display:"block",marginBottom:5}}>角度（通常記事）</label>
              <select value={angle} onChange={e=>setAngle(e.target.value)} style={{width:"100%",padding:"7px 10px",borderRadius:8,border:"1px solid "+C.border,background:C.surface,fontSize:12,color:C.text}}>
                <option value="all">🔄 全角度ミックス</option>
                {ANGLES.map(a=><option key={a.id} value={a.id}>{a.icon} {a.label}</option>)}
              </select>
            </div>
            <div>
              <label style={{fontSize:11,color:C.dim,display:"block",marginBottom:5}}>業種</label>
              <select value={industry} onChange={e=>setIndustry(e.target.value)} style={{width:"100%",padding:"7px 10px",borderRadius:8,border:"1px solid "+C.border,background:C.surface,fontSize:12,color:C.text}}>
                <option value="all">🔄 全業種ミックス</option>
                {INDUSTRIES.map(ind=><option key={ind} value={ind}>{ind}</option>)}
              </select>
            </div>
          </div>
          <button onClick={generate} disabled={running} style={{marginTop:16,width:"100%",padding:"13px 0",borderRadius:12,background:running?C.muted:"linear-gradient(135deg,"+C.accent+","+C.accentDark+")",color:"#fff",fontWeight:800,fontSize:14,border:"none",cursor:running?"not-allowed":"pointer",boxShadow:running?"none":"0 4px 20px rgba(192,90,46,0.3)"}}>
            {running?"🔄 生成中... "+progress+"/"+count+"本（記事＋画像プロンプトを同時生成）":"🔫 "+count+"本一括生成スタート"}
          </button>
          {running&&<div style={{marginTop:10,height:5,background:C.border,borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:(progress/count*100)+"%",background:"linear-gradient(90deg,"+C.accent+","+C.green+")",transition:"width 0.5s",borderRadius:3}}/></div>}
        </div>

        {articles.length>0&&<ImageGenPanel articles={articles}/>}

        {articles.length>0&&(
          <div style={{marginBottom:16}}>
            <div style={{fontSize:12,fontWeight:700,color:C.dim,marginBottom:8,display:"flex",alignItems:"center",gap:10}}>
              <span>✅ {articles.length}本完了</span>
              <span style={{fontSize:11,color:C.fail}}>💥 失敗談：{articles.filter(a=>a._isFail).length}本</span>
              <span style={{fontSize:11,color:C.muted}}>— クリックして確認・コピー</span>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:8}}>
              {articles.map((art,i)=>{
                const ang=art._isFail?FAIL_ANGLE:ANGLES.find(a=>a.id===art._angle);
                return(
                  <div key={i} onClick={()=>{setSelected(art);setTab("note");}} style={cardStyle(art)}>
                    <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:5}}>
                      <span style={{fontSize:12}}>{ang?.icon}</span>
                      <span style={{fontSize:10,padding:"1px 6px",borderRadius:4,background:art._isFail?"rgba(124,92,191,0.15)":"rgba(192,90,46,0.1)",color:art._isFail?C.fail:C.accent,fontWeight:600}}>{ang?.label}</span>
                      {!art._isFail&&<span style={{fontSize:10,color:C.muted}}>{art._industry}</span>}
                      {art._isFail&&<span style={{fontSize:10,color:C.fail,fontWeight:600}}>本音あり</span>}
                    </div>
                    <div style={{fontSize:12,fontWeight:700,color:art._isFail?C.fail:C.text,lineHeight:1.4}}>{art.title}</div>
                    <div style={{marginTop:4,fontSize:10,color:C.muted}}>🖼 画像プロンプト生成済み</div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {selected&&(
          <div style={{background:selected._isFail?C.failBg:C.card,borderRadius:16,border:"1px solid "+(selected._isFail?C.failBorder:C.border),padding:20}}>
            <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:14}}>
              <div>
                {selected._isFail&&<div style={{fontSize:11,color:C.fail,fontWeight:700,marginBottom:4}}>💥 失敗談・遠回り話</div>}
                <div style={{fontSize:15,fontWeight:800,color:selected._isFail?C.fail:C.text,paddingRight:12}}>{selected.title}</div>
              </div>
              <button onClick={()=>setSelected(null)} style={{background:"none",border:"none",cursor:"pointer",fontSize:16,color:C.muted}}>✕</button>
            </div>
            <div style={{display:"flex",gap:4,marginBottom:14,borderBottom:"1px solid "+C.border,paddingBottom:10,flexWrap:"wrap"}}>
              {TABS.map(([t,l])=><button key={t} onClick={()=>setTab(t)} style={{padding:"5px 14px",borderRadius:6,fontSize:12,fontWeight:700,cursor:"pointer",background:tab===t?(selected._isFail?C.fail:C.accent):"transparent",color:tab===t?"#fff":C.dim,border:"1px solid "+(tab===t?(selected._isFail?C.fail:C.accent):C.border)}}>{l}</button>)}
            </div>

            {tab==="note"&&(
              <div>
                <div style={{marginBottom:10}}>
                  <div style={{fontSize:10,color:C.muted,marginBottom:3}}>タイトル</div>
                  <div style={{display:"flex",gap:6}}>
                    <div style={{flex:1,padding:"8px 10px",borderRadius:8,background:C.surface,border:"1px solid "+C.border,fontSize:13,fontWeight:700,color:C.text}}>{selected.title}</div>
                    <button onClick={()=>copyText(selected.title,"title")} style={{padding:"8px 10px",borderRadius:8,background:copied==="title"?C.green:C.surface,color:copied==="title"?"#fff":C.dim,border:"1px solid "+C.border,cursor:"pointer",fontSize:11,whiteSpace:"nowrap"}}>{copied==="title"?"✅":"📋コピー"}</button>
                  </div>
                </div>
                <div style={{marginBottom:10}}>
                  <div style={{fontSize:10,color:C.muted,marginBottom:3}}>本文</div>
                  <div style={{display:"flex",gap:6,alignItems:"flex-start"}}>
                    <textarea readOnly value={selected.note_body} rows={10} style={{flex:1,padding:"8px 10px",borderRadius:8,background:C.surface,border:"1px solid "+C.border,fontSize:12,color:C.text,resize:"vertical",lineHeight:1.7}}/>
                    <button onClick={()=>copyText(selected.note_body,"body")} style={{padding:"8px 10px",borderRadius:8,background:copied==="body"?C.green:C.surface,color:copied==="body"?"#fff":C.dim,border:"1px solid "+C.border,cursor:"pointer",fontSize:11,whiteSpace:"nowrap"}}>{copied==="body"?"✅":"📋コピー"}</button>
                  </div>
                </div>
                <div>
                  <div style={{fontSize:10,color:C.muted,marginBottom:4}}>noteタグ</div>
                  <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                    {(selected.note_tags||[]).map((tag,i)=><span key={i} style={{padding:"3px 8px",borderRadius:20,background:"rgba(192,90,46,0.1)",color:C.accent,fontSize:11,fontWeight:600}}>{tag}</span>)}
                    <button onClick={()=>copyText((selected.note_tags||[]).join(" "),"tags")} style={{padding:"3px 8px",borderRadius:20,background:copied==="tags"?C.green:C.surface,color:copied==="tags"?"#fff":C.dim,fontSize:10,border:"1px solid "+C.border,cursor:"pointer"}}>{copied==="tags"?"✅全コピー":"全コピー"}</button>
                  </div>
                </div>
              </div>
            )}

            {tab==="x"&&(
              <div>
                <div style={{marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                    <div style={{fontSize:10,color:C.muted}}>Xポスト</div>
                    <div style={{fontSize:10,color:(selected.x_post||"").length>120?C.accent:C.muted}}>{(selected.x_post||"").length}字</div>
                  </div>
                  <div style={{display:"flex",gap:6,alignItems:"flex-start"}}>
                    <textarea readOnly value={selected.x_post} rows={4} style={{flex:1,padding:"8px 10px",borderRadius:8,background:C.surface,border:"1px solid "+C.border,fontSize:13,color:C.text,resize:"vertical"}}/>
                    <button onClick={()=>copyText(selected.x_post,"xpost")} style={{padding:"8px 10px",borderRadius:8,background:copied==="xpost"?C.green:C.surface,color:copied==="xpost"?"#fff":C.dim,border:"1px solid "+C.border,cursor:"pointer",fontSize:11,whiteSpace:"nowrap"}}>{copied==="xpost"?"✅":"📋コピー"}</button>
                  </div>
                </div>
                <div style={{marginBottom:12}}>
                  <div style={{fontSize:10,color:C.muted,marginBottom:4}}>Xハッシュタグ</div>
                  <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                    {(selected.x_hashtags||[]).map((tag,i)=><span key={i} style={{padding:"3px 8px",borderRadius:20,background:"rgba(29,161,242,0.1)",color:"#1da1f2",fontSize:11,fontWeight:600}}>{tag}</span>)}
                    <button onClick={()=>copyText((selected.x_hashtags||[]).join(" "),"xtags")} style={{padding:"3px 8px",borderRadius:20,background:copied==="xtags"?C.green:C.surface,color:copied==="xtags"?"#fff":C.dim,fontSize:10,border:"1px solid "+C.border,cursor:"pointer"}}>{copied==="xtags"?"✅全コピー":"全コピー"}</button>
                  </div>
                </div>
                <a href={"https://twitter.com/intent/tweet?text="+encodeURIComponent((selected.x_post||"")+"\n"+(selected.x_hashtags||[]).join(" "))} target="_blank" rel="noopener" style={{display:"inline-flex",alignItems:"center",gap:6,padding:"8px 16px",borderRadius:8,background:"#1da1f2",color:"#fff",fontWeight:700,fontSize:12,textDecoration:"none"}}>🐦 Xで今すぐ投稿</a>
              </div>
            )}

            {tab==="img"&&(
              <div>
                <div style={{padding:"10px 14px",borderRadius:8,background:C.failBg,border:"1px solid "+C.failBorder,marginBottom:14,fontSize:12,color:C.fail,lineHeight:1.6}}>
                  <strong>使い方：</strong>ChatGPT（DALL-E）またはMidjourney/Ideogramにコピペ。<br/>
                  ① テキストなし版を先に生成 → ② 気に入ったらテキストあり版で再生成<br/>
                  保存ファイル名：<code style={{background:"rgba(0,0,0,0.06)",padding:"1px 4px",borderRadius:3,fontSize:11}}>thumbnail_{String(selected._id+1).padStart(3,"0")}_{selected._isFail?"fail":"note"}.png</code>
                </div>
                <div style={{marginBottom:16}}>
                  <div style={{fontSize:11,fontWeight:700,color:C.dim,marginBottom:6}}>① テキストなし版（汎用・SNS向け）</div>
                  <div style={{display:"flex",gap:6,alignItems:"flex-start"}}>
                    <textarea readOnly value={selected.img_prompt_no_text||"（生成されませんでした — 再生成してください）"} rows={5} style={{flex:1,padding:"8px 10px",borderRadius:8,background:C.surface,border:"1px solid "+C.border,fontSize:12,color:C.text,resize:"vertical",lineHeight:1.6,fontFamily:"monospace"}}/>
                    <button onClick={()=>copyText(selected.img_prompt_no_text||"","img1")} style={{padding:"8px 10px",borderRadius:8,background:copied==="img1"?C.green:C.surface,color:copied==="img1"?"#fff":C.dim,border:"1px solid "+C.border,cursor:"pointer",fontSize:11,whiteSpace:"nowrap"}}>{copied==="img1"?"✅":"📋コピー"}</button>
                  </div>
                  <a href={"https://chat.openai.com/?q="+encodeURIComponent("以下のプロンプトで画像を生成してください:\n"+(selected.img_prompt_no_text||""))} target="_blank" rel="noopener" style={{display:"inline-flex",alignItems:"center",gap:5,marginTop:6,padding:"5px 12px",borderRadius:6,background:"#10a37f",color:"#fff",fontWeight:700,fontSize:11,textDecoration:"none"}}>🤖 ChatGPTで生成する</a>
                </div>
                <div>
                  <div style={{fontSize:11,fontWeight:700,color:C.dim,marginBottom:6}}>② テキストあり版（note専用サムネ）</div>
                  <div style={{display:"flex",gap:6,alignItems:"flex-start"}}>
                    <textarea readOnly value={selected.img_prompt_with_text||"（生成されませんでした — 再生成してください）"} rows={5} style={{flex:1,padding:"8px 10px",borderRadius:8,background:C.surface,border:"1px solid "+C.border,fontSize:12,color:C.text,resize:"vertical",lineHeight:1.6,fontFamily:"monospace"}}/>
                    <button onClick={()=>copyText(selected.img_prompt_with_text||"","img2")} style={{padding:"8px 10px",borderRadius:8,background:copied==="img2"?C.green:C.surface,color:copied==="img2"?"#fff":C.dim,border:"1px solid "+C.border,cursor:"pointer",fontSize:11,whiteSpace:"nowrap"}}>{copied==="img2"?"✅":"📋コピー"}</button>
                  </div>
                  <a href={"https://chat.openai.com/?q="+encodeURIComponent("以下のプロンプトで画像を生成してください:\n"+(selected.img_prompt_with_text||""))} target="_blank" rel="noopener" style={{display:"inline-flex",alignItems:"center",gap:5,marginTop:6,padding:"5px 12px",borderRadius:6,background:"#10a37f",color:"#fff",fontWeight:700,fontSize:11,textDecoration:"none"}}>🤖 ChatGPTで生成する</a>
                </div>
                <div style={{marginTop:14,padding:"8px 12px",borderRadius:8,background:C.surface,border:"1px solid "+C.border,fontSize:11,color:C.muted}}>
                  💡 「🖼 サムネCSV」ボタンで全記事分のプロンプトを一括ダウンロード → thumbnailsフォルダで管理
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}


/* ══════════════════════════════════════════
   DALL-E 3 自動画像生成 + フォルダ保存
══════════════════════════════════════════ */

async function generateImage(prompt, filename, dirHandle) {
  const key = localStorage.getItem("openai_api_key");
  if (!key) throw new Error("APIキー未設定");
  const res = await fetch(PROXY_URL+"/openai-image", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({model:"dall-e-3",prompt:prompt,n:1,size:"1792x1024",quality:"standard",response_format:"url"})
  });
  if (!res.ok) {const e=await res.json();throw new Error(e.error?.message||"API Error");}
  const data = await res.json();
  const imgUrl = data.data[0].url;
  // 画像をfetchしてバイナリに変換
  const imgRes = await fetch(imgUrl);
  const blob = await imgRes.blob();
  // フォルダに保存
  if (dirHandle) {
    const fileHandle = await dirHandle.getFileHandle(filename, {create:true});
    const writable = await fileHandle.createWritable();
    await writable.write(blob);
    await writable.close();
  } else {
    // フォルダ未選択の場合はダウンロード
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href=url; a.download=filename; a.click();
    URL.revokeObjectURL(url);
  }
  return imgUrl;
}

function ImageGenPanel({articles}) {
  const [apiKey, setApiKey] = React.useState(()=>localStorage.getItem("openai_api_key")||"");
  const [keyVisible, setKeyVisible] = React.useState(false);
  const [dirHandle, setDirHandle] = React.useState(null);
  const [running, setRunning] = React.useState(false);
  const [progress, setProgress] = React.useState(0);
  const [log, setLog] = React.useState([]);
  const [useNoText, setUseNoText] = React.useState(true);

  const saveKey = () => {
    localStorage.setItem("openai_api_key", apiKey);
    alert("APIキーを保存しました");
  };

  const pickFolder = async () => {
    try {
      const handle = await window.showDirectoryPicker({mode:"readwrite"});
      setDirHandle(handle);
    } catch(e) { console.log("フォルダ選択キャンセル"); }
  };

  const runAll = async () => {
    if (!localStorage.getItem("openai_api_key")) { alert("OpenAI APIキーを先に保存してください"); return; }
    if (articles.length === 0) { alert("先に記事を生成してください"); return; }
    setRunning(true); setProgress(0); setLog([]);
    const addLog = (msg) => setLog(prev=>[...prev, msg]);

    for (let i=0; i<articles.length; i++) {
      const art = articles[i];
      const prompt = useNoText ? art.img_prompt_no_text : art.img_prompt_with_text;
      const suffix = useNoText ? "notxt" : "txt";
      const filename = "thumbnail_"+String(i+1).padStart(3,"0")+"_"+(art._isFail?"fail":"note")+"_"+suffix+".png";
      if (!prompt) { addLog("⚠ #"+(i+1)+" プロンプトなし — スキップ"); setProgress(i+1); continue; }
      try {
        addLog("🔄 #"+(i+1)+" 生成中: "+art.title?.substring(0,20)+"...");
        await generateImage(prompt, filename, dirHandle);
        addLog("✅ #"+(i+1)+" 保存: "+filename);
      } catch(e) {
        addLog("❌ #"+(i+1)+" エラー: "+e.message);
      }
      setProgress(i+1);
      // レート制限対策: 1枚ごとに2秒待機
      if (i < articles.length-1) await new Promise(r=>setTimeout(r,2000));
    }
    setRunning(false);
    addLog("🎉 完了！ "+articles.length+"枚処理しました");
  };

  const C2 = {accent:"#c05a2e",accentDark:"#9e4623",fail:"#7c5cbf",green:"#3a8f6e",
    card:"#fff",surface:"#faf7f2",border:"#e0d8d0",text:"#1a1a1a",dim:"#555",muted:"#999"};

  return (
    <div style={{background:C2.card,borderRadius:16,border:"1px solid "+C2.border,padding:20,marginBottom:16}}>
      <div style={{fontSize:12,fontWeight:700,color:C2.accent,marginBottom:14,letterSpacing:"0.08em"}}>🖼 DALL-E 3 一括画像生成</div>

      {/* APIキー設定 */}
      <div style={{marginBottom:12}}>
        <label style={{fontSize:11,color:C2.dim,display:"block",marginBottom:4}}>OpenAI APIキー（platform.openai.com）</label>
        <div style={{display:"flex",gap:6}}>
          <input type={keyVisible?"text":"password"} value={apiKey} onChange={e=>setApiKey(e.target.value)}
            placeholder="sk-proj-..." style={{flex:1,padding:"8px 10px",borderRadius:8,border:"1px solid "+C2.border,background:C2.surface,fontSize:12,color:C2.text,fontFamily:"monospace"}}/>
          <button onClick={()=>setKeyVisible(!keyVisible)} style={{padding:"8px 10px",borderRadius:8,background:C2.surface,border:"1px solid "+C2.border,cursor:"pointer",fontSize:11,color:C2.dim}}>{keyVisible?"🙈":"👁"}</button>
          <button onClick={saveKey} style={{padding:"8px 14px",borderRadius:8,background:C2.green,color:"#fff",fontWeight:700,fontSize:11,border:"none",cursor:"pointer"}}>保存</button>
        </div>
        <div style={{fontSize:10,color:C2.muted,marginTop:3}}>※ APIキーはCloudflare Workerの環境変数で管理。ここでの入力は不要です。</div>
      </div>

      {/* フォルダ選択 */}
      <div style={{marginBottom:12}}>
        <label style={{fontSize:11,color:C2.dim,display:"block",marginBottom:4}}>保存先フォルダ</label>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <button onClick={pickFolder} style={{padding:"8px 16px",borderRadius:8,background:C2.surface,border:"1px solid "+C2.border,cursor:"pointer",fontSize:12,color:C2.dim,fontWeight:600}}>
            📁 フォルダを選択
          </button>
          <span style={{fontSize:12,color:dirHandle?C2.green:C2.muted}}>
            {dirHandle ? "✅ "+dirHandle.name+"（選択済み）" : "未選択（選択しないと1枚ずつダウンロード）"}
          </span>
        </div>
      </div>

      {/* プロンプト種別 */}
      <div style={{marginBottom:14,display:"flex",gap:8}}>
        {[["テキストなし版（汎用）",true],["テキストあり版（noteサムネ専用）",false]].map(([label,val])=>(
          <button key={String(val)} onClick={()=>setUseNoText(val)} style={{padding:"6px 14px",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer",
            background:useNoText===val?C2.accent:C2.surface,color:useNoText===val?"#fff":C2.dim,
            border:"1px solid "+(useNoText===val?C2.accent:C2.border)}}>{label}</button>
        ))}
      </div>

      {/* 実行ボタン */}
      <button onClick={runAll} disabled={running||articles.length===0} style={{width:"100%",padding:"13px 0",borderRadius:12,background:running?C2.muted:"linear-gradient(135deg,"+C2.accent+","+C2.accentDark+")",color:"#fff",fontWeight:800,fontSize:14,border:"none",cursor:running?"not-allowed":"pointer",marginBottom:10,boxShadow:running?"none":"0 4px 20px rgba(192,90,46,0.3)"}}>
        {running ? "🔄 生成中... "+progress+"/"+articles.length+"枚" : "🚀 ワンクリックで全"+articles.length+"枚を生成・保存"}
      </button>

      {/* プログレスバー */}
      {running && articles.length>0 && (
        <div style={{height:5,background:C2.border,borderRadius:3,overflow:"hidden",marginBottom:10}}>
          <div style={{height:"100%",width:(progress/articles.length*100)+"%",background:"linear-gradient(90deg,"+C2.accent+","+C2.green+")",transition:"width 0.5s",borderRadius:3}}/>
        </div>
      )}

      {/* ログ */}
      {log.length>0 && (
        <div style={{maxHeight:160,overflowY:"auto",padding:"8px 10px",borderRadius:8,background:C2.surface,border:"1px solid "+C2.border,fontSize:11,color:C2.dim,lineHeight:1.8,fontFamily:"monospace"}}>
          {log.map((l,i)=><div key={i}>{l}</div>)}
        </div>
      )}
    </div>
  );
}
